# =======================================================
# GitHub Actions CI/CD Pipeline
# =======================================================
# Triggers:  push to main/develop, PR to main
# Jobs:
#   1. test     — compile, unit + integration tests, coverage
#   2. build    — Docker image via multi-stage Dockerfile
#   3. security — Trivy container vulnerability scan
#   4. deploy-staging  — deploy to staging (on develop branch)
#   5. deploy-prod     — deploy to production (on main, manual gate)
# =======================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Change these to your registry / image name
  # REGISTRY: docker.io
  IMAGE_NAME: manasabolla/cicd-java-project
  JAVA_VERSION: "17"

jobs:

  # ============================================================
  # JOB 1: Test — compile, test, coverage
  # ============================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean compile

     
      - name: Run Tests with Coverage
        run: mvn -B test
      - name: Generate code coverage report
        run: mvn -B jacoco:report
      
    
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ============================================================
  # JOB 2: Build Docker Image & Push to Registry
  # ============================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only build on push (not on PRs)
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with branch name
            type=ref,event=branch
            # Tag with PR number
            type=ref,event=pr
            # Tag with semver on release
            type=semver,pattern={{version}}
            # Always tag latest on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with short git SHA
            type=sha,prefix=sha-

      - name: Build and Push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via registry
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          # Build for multiple platforms
          platforms: linux/amd64,linux/arm64

  # ============================================================
  # JOB 3: Security Scan
  # ============================================================
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          #image-ref: "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"   # Fail if CRITICAL/HIGH CVEs found

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ============================================================
  # JOB 4: Deploy to Staging (develop branch only)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubectl (staging)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging namespace
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          kubectl set image deployment/cicd-demo-app \
              app="$IMAGE_TAG" \
              --namespace=staging \
              --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cicd-demo-app \
              --namespace=staging \
              --timeout=300s

      - name: Run smoke tests against staging
        run: bash scripts/smoke-test.sh https://staging.example.com

  # ============================================================
  # JOB 5: Deploy to Production (main branch + manual approval)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://app.example.com
    # 'production' environment requires a reviewer to approve in GitHub UI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubectl (production)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to production namespace
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          kubectl set image deployment/cicd-demo-app \
              app="$IMAGE_TAG" \
              --namespace=production \
              --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cicd-demo-app \
              --namespace=production \
              --timeout=300s

      - name: Run smoke tests against production
        run: bash scripts/smoke-test.sh https://app.example.com

      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "✅ Production deploy succeeded for commit ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "🚨 Production deploy FAILED for commit ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
