# =======================================================
# Kubernetes Deployment Manifest
# =======================================================
# Apply:  kubectl apply -f k8s/deployment.yaml -n production
# =======================================================

# ---- Namespace ----
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    app.kubernetes.io/part-of: cicd-demo

---

# ---- ConfigMap (non-secret app config) ----
apiVersion: v1
kind: ConfigMap
metadata:
  name: cicd-demo-config
  namespace: production
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"

---

# ---- Secret (DB credentials — base64 encoded) ----
# Replace values with: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: cicd-demo-secrets
  namespace: production
type: Opaque
data:
  DB_USERNAME: YXBwdXNlcg==        # appuser
  DB_PASSWORD: c3VwZXJzZWNyZXQ=   # supersecret
  DB_URL: amRiYzpwb3N0Z3Jlc3FsOi8vcG9zdGdyZXM6NTQzMi9wcm9kZGI=

---

# ---- Deployment ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-demo-app
  namespace: production
  labels:
    app: cicd-demo-app
    version: "1.0.0"
spec:
  replicas: 3

  # Rolling update strategy — zero-downtime deploys
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # Allow at most 1 pod unavailable
      maxSurge: 1         # Spin up 1 extra pod during update

  selector:
    matchLabels:
      app: cicd-demo-app

  template:
    metadata:
      labels:
        app: cicd-demo-app
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      # Security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      containers:
        - name: app
          image: your-dockerhub-username/cicd-demo-app:latest  # CI replaces this tag
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080

          # Load non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: cicd-demo-config

          # Load secrets as individual env vars
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: cicd-demo-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cicd-demo-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cicd-demo-secrets
                  key: DB_PASSWORD

          # ---- Resource limits ----
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ---- Probes ----
          # Startup probe: give the JVM time to start before liveness kicks in
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          # Liveness probe: restart if app is unhealthy
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Readiness probe: stop sending traffic if not ready
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          # Security context at container level
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Writable tmp mount (read-only root FS)
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp

      volumes:
        - name: tmp-volume
          emptyDir: {}

      # Graceful shutdown: wait for in-flight requests
      terminationGracePeriodSeconds: 60

---

# ---- Horizontal Pod Autoscaler ----
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cicd-demo-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cicd-demo-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---

# ---- Service ----
apiVersion: v1
kind: Service
metadata:
  name: cicd-demo-app
  namespace: production
  labels:
    app: cicd-demo-app
spec:
  selector:
    app: cicd-demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP  # Use LoadBalancer or NodePort if no Ingress controller

---

# ---- Ingress ----
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cicd-demo-app-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.example.com
      secretName: cicd-demo-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cicd-demo-app
                port:
                  number: 80

---

# ---- PodDisruptionBudget (ensure availability during node drains) ----
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cicd-demo-app-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cicd-demo-app
